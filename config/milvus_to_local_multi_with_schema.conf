env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Milvus {
    url = "http://192.162.11.52:29530"
    token = "root:Milvus"
    database = "default"
    collections = [
      "_sgcc_acs4aaaag2g3ud6d2"
      "_sgcc_aa22aaaagybphwp3w"
    ]
    batch_size = 100
  }
}

sink {
  LocalFile {
    # 按 collection 名输出到独立目录
    path = "/data/output/${table_name}"

    # csv 不支持 FLOAT_VECTOR，改为 parquet 以兼容向量字段
    file_format_type = "parquet"

    # 每个并行度只输出一个文件，便于查看
    single_file_mode = true

    # 每次重跑先清空目录，避免旧数据混入
    schema_save_mode = "RECREATE_SCHEMA"
    data_save_mode = "DROP_DATA"
  }
}
