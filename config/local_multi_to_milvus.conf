env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  LocalFile {
    tables_configs = [
      {
        schema {
          table = "parquet_a"
        }
        path = "/data/output/parquet_a"
        file_format_type = "parquet"
      },
      {
        schema {
          table = "parquet_b"
        }
        path = "/data/output/parquet_b"
        file_format_type = "parquet"
      }
    ]
  }
}

sink {
  Milvus {
    url = "http://192.162.11.52:29530"
    token = "root:Milvus"
    database = "bak2"
    enable_dynamic_field = false
    schema_save_mode = "CREATE_SCHEMA_WHEN_NOT_EXIST"
    batch_size = 100

    # If each parquet has compatible columns, one field_schema can be reused.
    field_schema = [
      {
        field_name = "ID"
        source_field_name = "id"
        data_type = 21
        max_length = 256
        is_primary_key = true
        auto_id = false
      }
      {
        field_name = "vector"
        source_field_name = "vector"
        data_type = 101
        dimension = 1024
      }
      {
        field_name = "text"
        source_field_name = "text"
        data_type = 21
        max_length = 65535
      }
      {
        field_name = "metadata"
        source_field_name = "metadata"
        data_type = 23
      }
    ]

    # Key: source table name from tables_configs[*].schema.table
    # Value: target milvus collection name
    collection_rename = {
      parquet_a = "collection_a"
      parquet_b = "collection_b"
    }
  }
}
